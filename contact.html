<form action="https://api.web3forms.com/submit" method="POST">

    <!-- Web3Forms Access Key -->
    <input type="hidden" name="access_key" value="00525ad5-2fd6-4acc-b8ba-3902b2ddaba7">

    <!-- Email Subject -->
    <input type="hidden" name="subject" value="New Consultation Request - Clovers Virtual Assistance">

    <!-- Redirect after successful submission -->
    <input type="hidden" name="redirect" value="https://cloversva.org/">

    <!-- Spam Protection -->
    <input type="checkbox" name="botcheck" style="display:none;">

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Company (Optional)</label>
    <input type="text" name="company">

    <label>What do you need help with?</label>
    <select name="service" required>
        <option value="">Choose one</option>
        <option>Administrative Support</option>
        <option>Customer Service</option>
        <option>Social Media Management</option>
        <option>Executive Assistance</option>
        <option>Healthcare Support</option>
    </select>

    <label>Anything else we should know?</label>
    <textarea name="message"></textarea>

    <button type="submit">Send Message</button>

</form>
